spring:
  datasource:
    url: jdbc:postgresql://91.146.28.240:5111/users
    username: user
    password: user
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

  security:
    user:
      name: admin
      password: admin
      roles:
        - ADMIN

  batch:
    jdbc:
      initialize-schema: always  # Это создаст таблицы Spring Batch
    job:
      enabled: true

graphql:
  webclient:
#    endpoint: http://docker.mospolytech.ru:3345/userinfo/graphql
     endpoint: http://localhost:8085/userinfo/graphql

logging:
  level:
    root: INFO